<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100일 포도알 챌린지</title>
    
    <!-- iOS 전용 진짜 어플처럼 보이게 하는 마법의 코드 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="100일 포도알">
    
    <!-- 기본 포도알 아이콘 설정 (웹, iOS 모두 적용) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍇</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23f3e8ff%22/><text x=%2250%22 y=%2250%22 font-size=%2270%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🍇</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .scale-in { animation: scaleIn 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .grape-btn {
            min-height: 36px;
        }
        @media (min-width: 768px) {
            .grape-btn { min-height: 48px; }
        }
        
        /* 모바일에서 터치할 때 파란색 박스 깜빡이는 현상 제거 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-purple-50 text-slate-800 font-sans min-h-screen pb-10">

    <div id="app"></div>

    <script>
        // --- 유틸리티 ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        };
        
        // 날짜 포맷 함수 (예: 2026. 4. 19. (일))
        const formatDate = (isoString) => {
            if (!isoString) return '';
            const date = new Date(isoString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const d = date.getDate();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayName = dayNames[date.getDay()];
            return `${year}. ${month}. ${d}. (${dayName})`;
        };

        // --- 아이콘 (SVG) ---
        const Icons = {
            Plus: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
            ChevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
            Trash2: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`,
            Check: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
            Info: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            Edit3: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`,
            Download: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
            Upload: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>`,
            AlertTriangle: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`
        };

        // --- 전역 상태 관리 ---
        let state = {
            challenges: JSON.parse(localStorage.getItem('100days-challenges')) || [],
            currentView: 'list',
            activeChallengeId: null,
            isAddModalOpen: false,
            isRecordModalOpen: false,
            selectedDay: null,
            deleteConfirm: { isOpen: false, id: null },
            // 백업/복원 알림용 상태
            alertBox: { isOpen: false, title: '', message: '', type: 'info' }, // type: info, error
            importConfirm: { isOpen: false, data: null }
        };

        function updateState(newState) {
            state = { ...state, ...newState };
            localStorage.setItem('100days-challenges', JSON.stringify(state.challenges));
            render();
        }

        window.goToList = () => updateState({ currentView: 'list', activeChallengeId: null });
        window.openAddModal = () => updateState({ isAddModalOpen: true });
        window.closeAddModal = () => updateState({ isAddModalOpen: false });
        window.openChallenge = (id) => updateState({ currentView: 'detail', activeChallengeId: id });
        window.closeAlert = () => updateState({ alertBox: { isOpen: false, title: '', message: '', type: 'info' } });

        window.submitChallenge = (event) => {
            event.preventDefault();
            const input = document.getElementById('newChallengeTitle');
            const title = input.value.trim();
            if (!title) return;

            const newChallenge = {
                id: generateId(),
                title: title,
                createdAt: new Date().toISOString(),
                records: {}
            };
            
            updateState({
                challenges: [newChallenge, ...state.challenges],
                isAddModalOpen: false
            });
        };

        // 삭제 확인 모달
        window.promptDelete = (id, event) => {
            event.stopPropagation();
            updateState({ deleteConfirm: { isOpen: true, id: id } });
        };
        window.cancelDelete = () => updateState({ deleteConfirm: { isOpen: false, id: null } });
        window.confirmDelete = () => {
            const id = state.deleteConfirm.id;
            const newChallenges = state.challenges.filter(c => c.id !== id);
            let updates = { challenges: newChallenges, deleteConfirm: { isOpen: false, id: null } };
            if (state.activeChallengeId === id) {
                updates.currentView = 'list';
                updates.activeChallengeId = null;
            }
            updateState(updates);
        };

        // 기록 작성/수정
        window.openRecordModal = (day) => {
            updateState({ isRecordModalOpen: true, selectedDay: day });
            setTimeout(() => {
                const active = state.challenges.find(c => c.id === state.activeChallengeId);
                const record = active.records[day];
                if (record) document.getElementById('recordNote').value = record.note;
                
                setTimeout(() => document.getElementById('recordNote').focus(), 50);
            }, 0);
        };
        window.closeRecordModal = () => updateState({ isRecordModalOpen: false, selectedDay: null });

        window.saveRecord = (event) => {
            event.preventDefault();
            const note = document.getElementById('recordNote').value.trim();
            const day = state.selectedDay;
            
            const activeChallenge = state.challenges.find(c => c.id === state.activeChallengeId);
            const existingRecord = activeChallenge.records[day];
            const recordDate = existingRecord && existingRecord.date ? existingRecord.date : new Date().toISOString();
            
            const newChallenges = state.challenges.map(c => {
                if (c.id === state.activeChallengeId) {
                    return {
                        ...c,
                        records: { ...c.records, [day]: { completed: true, note: note, date: recordDate } }
                    };
                }
                return c;
            });
            updateState({ challenges: newChallenges, isRecordModalOpen: false, selectedDay: null });
        };

        window.removeRecord = () => {
            const day = state.selectedDay;
            const newChallenges = state.challenges.map(c => {
                if (c.id === state.activeChallengeId) {
                    const newRecords = { ...c.records };
                    delete newRecords[day];
                    return { ...c, records: newRecords };
                }
                return c;
            });
            updateState({ challenges: newChallenges, isRecordModalOpen: false, selectedDay: null });
        };

        // --- 백업 및 복원 기능 ---
        window.exportData = () => {
            if (state.challenges.length === 0) {
                updateState({ alertBox: { isOpen: true, title: '백업 실패', message: '백업할 도전 기록이 없습니다.', type: 'error' }});
                return;
            }
            const dataStr = JSON.stringify(state.challenges);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            const date = new Date();
            const dateString = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
            a.download = `100days_backup_${dateString}.json`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            updateState({ alertBox: { isOpen: true, title: '백업 완료', message: '데이터 백업 파일이 다운로드되었습니다. 소중한 곳에 보관해 주세요!', type: 'info' }});
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (Array.isArray(parsedData)) {
                        // 정상적인 데이터인지 확인 후 복원 모달 열기
                        updateState({ importConfirm: { isOpen: true, data: parsedData } });
                    } else {
                        throw new Error("Invalid format");
                    }
                } catch (err) {
                    updateState({ alertBox: { isOpen: true, title: '오류', message: '올바른 백업 파일(.json)이 아닙니다.', type: 'error' }});
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 선택 초기화
        };

        window.cancelImport = () => updateState({ importConfirm: { isOpen: false, data: null } });
        window.confirmImport = () => {
            const newData = state.importConfirm.data;
            updateState({ 
                challenges: newData, 
                currentView: 'list', 
                activeChallengeId: null,
                importConfirm: { isOpen: false, data: null },
                alertBox: { isOpen: true, title: '복원 성공! 🎉', message: '기존 데이터가 성공적으로 복원되었습니다.', type: 'info' }
            });
        };


        // --- 렌더링 함수 ---
        function renderHeader() {
            return `
                <header class="bg-white shadow-sm sticky top-0 z-10 env-safe-area-top">
                    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            ${state.currentView === 'detail' ? `
                                <button onclick="goToList()" class="p-2 -ml-2 text-slate-500 hover:text-purple-600 hover:bg-purple-50 rounded-full transition-colors">
                                    ${Icons.ChevronLeft}
                                </button>
                            ` : ''}
                            <h1 class="text-xl font-bold text-purple-700 flex items-center gap-2">
                                🍇 100일 포도알 챌린지
                            </h1>
                        </div>
                        ${state.currentView === 'list' ? `
                            <button onclick="openAddModal()" class="flex items-center gap-1 bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-full text-sm font-medium transition-colors shadow-sm">
                                ${Icons.Plus} 새 도전
                            </button>
                        ` : ''}
                    </div>
                </header>
            `;
        }

        function renderListView() {
            let contentHTML = '';
            
            if (state.challenges.length === 0) {
                contentHTML = `
                    <div class="text-center py-20 bg-white rounded-2xl shadow-sm border border-purple-100 fade-in mx-4 mt-8">
                        <div class="text-6xl mb-4">🌱</div>
                        <h2 class="text-xl font-semibold text-slate-700 mb-2">아직 시작한 도전이 없어요!</h2>
                        <p class="text-slate-500 mb-6">첫 번째 100일 챌린지를 만들어<br>포도알을 모아보세요.</p>
                        <button onclick="openAddModal()" class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-full font-medium transition-colors">
                            ${Icons.Plus} 첫 번째 목표 만들기
                        </button>
                    </div>
                `;
            } else {
                const cardsHTML = state.challenges.map(challenge => {
                    const completedDays = Object.keys(challenge.records).length;
                    const progress = Math.round((completedDays / 100) * 100);
                    return `
                        <div onclick="openChallenge('${challenge.id}')" class="bg-white p-5 rounded-2xl shadow-sm border border-purple-100 active:bg-purple-50 transition-all cursor-pointer group fade-in">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-lg font-bold text-slate-800 line-clamp-2 pr-4">${escapeHTML(challenge.title)}</h3>
                                <button onclick="promptDelete('${challenge.id}', event)" class="text-slate-300 hover:text-red-500 p-2 -m-2 rounded-full active:bg-red-50 transition-all">
                                    ${Icons.Trash2}
                                </button>
                            </div>
                            <div class="flex items-end justify-between mb-2">
                                <span class="text-sm font-medium text-slate-500">진행률</span>
                                <span class="text-2xl font-black text-purple-600">${progress}%</span>
                            </div>
                            <div class="w-full bg-purple-100 rounded-full h-2.5">
                                <div class="bg-purple-600 h-2.5 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
                contentHTML = `<div class="grid gap-4 sm:grid-cols-2 p-4 pt-8">${cardsHTML}</div>`;
            }

            // 하단 데이터 백업/복원 버튼 영역
            return `
                ${contentHTML}
                <div class="mt-12 mb-8 pt-6 border-t border-purple-200 flex justify-center gap-6 text-sm mx-4 fade-in">
                    <button onclick="exportData()" class="text-slate-500 hover:text-purple-600 flex items-center gap-1.5 px-3 py-2 rounded-lg active:bg-purple-100 transition-colors">
                        ${Icons.Download} 데이터 백업
                    </button>
                    <label class="text-slate-500 hover:text-purple-600 flex items-center gap-1.5 cursor-pointer px-3 py-2 rounded-lg active:bg-purple-100 transition-colors">
                        ${Icons.Upload} 데이터 복원
                        <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            `;
        }

        function renderDetailView() {
            const challenge = state.challenges.find(c => c.id === state.activeChallengeId);
            if (!challenge) return '';

            const completedCount = Object.keys(challenge.records).length;
            let grapesHTML = '';
            for (let i = 1; i <= 100; i++) {
                const record = challenge.records[i];
                if (record) {
                    const dateStr = record.date ? `\n(${formatDate(record.date)})` : '';
                    grapesHTML += `
                        <button onclick="openRecordModal(${i})" title="${i}일차${dateStr} : ${escapeHTML(record.note)}" class="grape-btn relative aspect-square rounded-full flex flex-col items-center justify-center text-xs md:text-sm transition-all duration-200 shadow-sm overflow-hidden p-1 bg-gradient-to-br from-purple-500 to-purple-700 text-white active:scale-95">
                            <span class="font-bold opacity-90 leading-none">${i}</span>
                            ${record.note ? `<span class="text-[9px] md:text-[10px] font-normal opacity-80 truncate w-full text-center mt-0.5 md:mt-1 px-1 block">${escapeHTML(record.note)}</span>` : ''}
                        </button>
                    `;
                } else {
                    grapesHTML += `
                        <button onclick="openRecordModal(${i})" title="${i}일차 기록하기" class="grape-btn relative aspect-square rounded-full flex flex-col items-center justify-center text-xs md:text-sm transition-all duration-200 shadow-sm overflow-hidden p-1 bg-white text-slate-400 border border-slate-200 active:bg-purple-50 font-semibold">
                            ${i}
                        </button>
                    `;
                }
            }

            let recentRecordsHTML = '';
            const recordsEntries = Object.entries(challenge.records);
            if (recordsEntries.length > 0) {
                const recentList = recordsEntries.sort((a, b) => Number(b[0]) - Number(a[0])).slice(0, 5).map(([day, record]) => {
                    const dateTag = record.date ? `<span class="text-xs text-slate-400 ml-2 font-normal">[${formatDate(record.date)}]</span>` : '';
                    return `
                        <div onclick="openRecordModal(${day})" class="flex gap-4 items-start p-3 active:bg-slate-50 rounded-xl transition-colors cursor-pointer border border-transparent active:border-purple-100">
                            <div class="bg-purple-100 text-purple-700 font-bold px-3 py-1.5 rounded-lg text-sm whitespace-nowrap flex items-center">
                                ${day}일차
                            </div>
                            <div class="text-slate-700 flex-1 pt-1">
                                <div>
                                    ${escapeHTML(record.note) || '<span class="text-slate-400 italic">내용 없음</span>'}
                                </div>
                                ${dateTag ? `<div class="mt-1">${dateTag}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                recentRecordsHTML = `
                    <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-5 md:p-8 mt-6 mb-8 mx-4">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span class="text-purple-600">${Icons.Edit3}</span> 최근 기록
                        </h3>
                        <div class="space-y-2">${recentList}</div>
                    </div>
                `;
            }

            return `
                <div class="fade-in max-w-3xl mx-auto">
                    <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-5 md:p-8 mt-8 mb-6 mx-4">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-2">${escapeHTML(challenge.title)}</h2>
                            <p class="text-purple-600 font-medium">
                                현재 <span class="text-xl font-bold">${completedCount}</span>개의 포도알을 모았어요! 🍇
                            </p>
                        </div>
                        
                        <div class="bg-purple-50/50 p-3 md:p-4 rounded-2xl border border-purple-100">
                            <div class="grid grid-cols-10 gap-1.5 md:gap-2">
                                ${grapesHTML}
                            </div>
                        </div>
                        
                        <div class="mt-6 flex items-start gap-2 text-sm text-slate-500 bg-slate-50 p-4 rounded-xl">
                            <span class="text-purple-500 mt-0.5 flex-shrink-0">${Icons.Info}</span>
                            <p>포도알을 눌러 기록을 남기세요. 이미 채운 포도알을 다시 누르면 수정할 수 있습니다.</p>
                        </div>
                    </div>
                    ${recentRecordsHTML}
                </div>
            `;
        }

        function renderModals() {
            let modalsHTML = '';

            // 알림 메시지 모달
            if (state.alertBox.isOpen) {
                const isError = state.alertBox.type === 'error';
                modalsHTML += `
                    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl scale-in p-6 text-center">
                            <div class="w-16 h-16 ${isError ? 'bg-red-50 text-red-500' : 'bg-purple-50 text-purple-600'} rounded-full flex items-center justify-center mx-auto mb-4">
                                ${isError ? Icons.AlertTriangle : Icons.Check}
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">${state.alertBox.title}</h3>
                            <p class="text-slate-500 text-sm mb-6">${state.alertBox.message}</p>
                            <button onclick="closeAlert()" class="w-full px-5 py-3 rounded-xl font-medium ${isError ? 'bg-red-500 active:bg-red-600' : 'bg-purple-600 active:bg-purple-700'} text-white transition-colors">확인</button>
                        </div>
                    </div>
                `;
            }

            // 복원 확인 모달
            if (state.importConfirm.isOpen) {
                modalsHTML += `
                    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl scale-in p-6 text-center">
                            <div class="w-16 h-16 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                ${Icons.AlertTriangle}
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">데이터 덮어쓰기</h3>
                            <p class="text-slate-500 text-sm mb-6">파일을 불러오면 <span class="font-bold text-red-500">현재 기기의 모든 기록이 삭제되고</span> 파일 내용으로 덮어씌워집니다.<br>계속하시겠습니까?</p>
                            <div class="flex gap-3 justify-center">
                                <button onclick="cancelImport()" class="px-5 py-3 rounded-xl font-medium text-slate-600 bg-slate-100 active:bg-slate-200 transition-colors flex-1">취소</button>
                                <button onclick="confirmImport()" class="px-5 py-3 rounded-xl font-medium bg-purple-600 active:bg-purple-700 text-white transition-colors flex-1">복원하기</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (state.isAddModalOpen) {
                modalsHTML += `
                    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4 z-50">
                        <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full max-w-md overflow-hidden shadow-2xl scale-in pb-safe">
                            <div class="p-6">
                                <h2 class="text-xl font-bold text-slate-800 mb-4">새로운 100일 도전 🚀</h2>
                                <form onsubmit="submitChallenge(event)">
                                    <div class="mb-6">
                                        <label class="block text-sm font-medium text-slate-600 mb-2">어떤 도전을 시작할까요?</label>
                                        <input type="text" id="newChallengeTitle" placeholder="예) 매일 3km 러닝하기" class="w-full px-4 py-4 sm:py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all text-lg sm:text-base" autofocus required />
                                    </div>
                                    <div class="flex gap-2 justify-end mt-4">
                                        <button type="button" onclick="closeAddModal()" class="px-5 py-3 sm:py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-100 active:bg-slate-200 transition-colors flex-1 sm:flex-none">취소</button>
                                        <button type="submit" class="px-5 py-3 sm:py-2.5 rounded-xl font-medium bg-purple-600 active:bg-purple-700 text-white transition-colors flex items-center justify-center gap-2 flex-1 sm:flex-none">
                                            ${Icons.Check} 시작하기
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (state.deleteConfirm.isOpen) {
                modalsHTML += `
                    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl scale-in p-6 text-center">
                            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                ${Icons.Trash2}
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">도전 삭제</h3>
                            <p class="text-slate-500 text-sm mb-6">정말 이 도전을 삭제하시겠습니까?<br>모든 기록이 영구적으로 사라집니다.</p>
                            <div class="flex gap-3 justify-center">
                                <button onclick="cancelDelete()" class="px-5 py-3 rounded-xl font-medium text-slate-600 bg-slate-100 active:bg-slate-200 transition-colors flex-1">취소</button>
                                <button onclick="confirmDelete()" class="px-5 py-3 rounded-xl font-medium bg-red-500 active:bg-red-600 text-white transition-colors flex-1">삭제하기</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (state.isRecordModalOpen && state.selectedDay) {
                const challenge = state.challenges.find(c => c.id === state.activeChallengeId);
                const record = challenge.records[state.selectedDay];
                const hasRecord = !!record;
                const dateDisplay = (hasRecord && record.date) ? ` <span class="text-sm font-normal text-purple-400">(${formatDate(record.date)})</span>` : '';
                
                modalsHTML += `
                    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4 z-50">
                        <div class="bg-white rounded-t-3xl sm:rounded-2xl w-full max-w-md overflow-hidden shadow-2xl scale-in pb-safe">
                            <div class="p-6 border-b border-slate-100 bg-purple-50/50">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-xl font-black text-purple-700">${state.selectedDay}일차 기록 🍇${dateDisplay}</h2>
                                    ${hasRecord ? `<button onclick="removeRecord()" class="text-red-500 active:bg-red-50 text-sm font-medium px-3 py-1.5 bg-white rounded-lg border border-red-100 shadow-sm transition-colors">포도알 지우기</button>` : ''}
                                </div>
                                <p class="text-sm text-slate-600 mt-1 line-clamp-1">${escapeHTML(challenge.title)}</p>
                            </div>
                            <div class="p-6">
                                <form onsubmit="saveRecord(event)">
                                    <div class="mb-6">
                                        <textarea id="recordNote" placeholder="예) 5km (짧게 쓰면 예뻐요!)" class="w-full px-4 py-4 sm:py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all resize-none h-32 text-lg sm:text-base"></textarea>
                                    </div>
                                    <div class="flex gap-2 justify-end">
                                        <button type="button" onclick="closeRecordModal()" class="px-5 py-3 sm:py-2.5 rounded-xl font-medium text-slate-600 hover:bg-slate-100 active:bg-slate-200 transition-colors flex-1 sm:flex-none">닫기</button>
                                        <button type="submit" class="px-5 py-3 sm:py-2.5 rounded-xl font-medium bg-purple-600 active:bg-purple-700 text-white transition-colors flex items-center justify-center gap-2 flex-1 sm:flex-none">
                                            ${Icons.Check} 포도알 칠하기
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
            }

            return modalsHTML;
        }

        function render() {
            document.getElementById('app').innerHTML = `
                ${renderHeader()}
                <main>
                    ${state.currentView === 'list' ? renderListView() : renderDetailView()}
                </main>
                ${renderModals()}
            `;
        }

        render();
    </script>
</body>
</html>
